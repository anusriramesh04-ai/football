<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #050816;
    font-family: Arial;
}

/* Clean Button */
button {
    padding: 18px 50px;
    font-size: 18px;
    border-radius: 50px;
    border: none;
    background: #03e9f4;
    color: black;
    cursor: pointer;
    box-shadow: 0 0 20px #03e9f4;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}
</style>

</head>
<body>

<button onclick="goToPage()">Click Me</button>

<script>
function goToPage() {
    window.location.href = "page2.html";
}
</script>

</body>
</html>
